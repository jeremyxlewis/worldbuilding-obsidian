name: Validate Skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate SKILL.md
        run: |
          # Check YAML frontmatter exists
          grep -q "^---$" skills/worldbuilding-obsidian/SKILL.md || { echo "ERROR: No YAML frontmatter"; exit 1; }
          
          # Check required fields exist
          grep -q "^name: " skills/worldbuilding-obsidian/SKILL.md || { echo "ERROR: Missing name field"; exit 1; }
          grep -q "^description: " skills/worldbuilding-obsidian/SKILL.md || { echo "ERROR: Missing description field"; exit 1; }
          
          # Check name format (kebab-case)
          NAME=$(sed -n 's/^name: //p' skills/worldbuilding-obsidian/SKILL.md)
          if ! echo "$NAME" | grep -qE '^[a-z0-9-]+$'; then
            echo "ERROR: Name must be kebab-case: $NAME"
            exit 1
          fi
          
          # Check name length
          if [ ${#NAME} -gt 64 ]; then
            echo "ERROR: Name too long (max 64): ${#NAME}"
            exit 1
          fi
          
          echo "✓ SKILL.md validation passed"

      - name: Validate templates
        run: |
          TEMPLATE_COUNT=$(find skills/worldbuilding-obsidian/assets/templates -name "*.md" | wc -l)
          echo "Found $TEMPLATE_COUNT templates"
          if [ "$TEMPLATE_COUNT" -lt 20 ]; then
            echo "ERROR: Expected at least 20 templates, found $TEMPLATE_COUNT"
            exit 1
          fi
          echo "✓ Template validation passed"

      - name: Validate scripts
        run: |
          for script in skills/worldbuilding-obsidian/scripts/*.py; do
            python -m py_compile "$script" || exit 1
          done
          echo "✓ Script validation passed"

      - name: Check references exist
        run: |
          REFS=(
            "entity-templates.md"
            "diagnostics.md"
            "dnd-systems.md"
            "dataview-queries.md"
            "calendar-systems.md"
            "continuity-enforcement.md"
            "humanizer-integration.md"
            "troubleshooting.md"
          )
          for ref in "${REFS[@]}"; do
            if [ ! -f "skills/worldbuilding-obsidian/references/$ref" ]; then
              echo "ERROR: Missing reference: $ref"
              exit 1
            fi
          done
          echo "✓ Reference validation passed"
